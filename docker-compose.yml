version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openfm-postgres
    environment:
      POSTGRES_DB: openfm
      POSTGRES_USER: openfm
      POSTGRES_PASSWORD: openfm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfm -d openfm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: openfm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: openfm-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://openfm:openfm@postgres:5432/openfm
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: openfm-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./apps/web:/app

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openfm-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@openfm.dev
      PGADMIN_DEFAULT_PASSWORD: admin

volumes:
  postgres_data:
